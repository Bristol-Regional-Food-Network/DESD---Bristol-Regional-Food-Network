{% extends 'base/base.html' %}

{% block content %}
  {% include 'admin/management_nav.html' %}
  <h1>Customers</h1>
  <table class="admin-table">
    <thead>
      <tr><th>Username</th><th>Name</th><th>Email</th><th>Actions</th></tr>
    </thead>
    <tbody>
    {% for u in customers %}
      <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.get_full_name }}</td>
        <td>{{ u.email }}</td>
        <td><a href="{% url 'admin_customer_edit' u.id %}">Edit</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No customers found.</td></tr>
    {% endfor %}
    </tbody>
  </table>
{% endblock %}
