<h1>Add Product</h1>

<form method="post">
  {% csrf_token %}

  <label>Name</label>
  <input type="text" name="name">

  <label>Description</label>
  <textarea name="description"></textarea>

  <label>Price</label>
  <input type="number" step="0.01" name="price">

  <button type="submit">Add Product</button>
</form>
