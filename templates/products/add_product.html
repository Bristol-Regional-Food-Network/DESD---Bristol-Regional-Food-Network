{% extends "base/base.html" %}

{% block title %}Add Product{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2 class="mb-4 text-center">Add Product</h2>

        <form method="post">
            {% csrf_token %}

            <!-- Product Name -->
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input 
                    type="text" 
                    name="name" 
                    class="form-control"
                    placeholder="Enter product name"
                    required
                >
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea 
                    name="description" 
                    class="form-control"
                    rows="3"
                    placeholder="Describe the product"
                ></textarea>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label class="form-label">Price (£)</label>
                <input 
                    type="number" 
                    name="price" 
                    class="form-control"
                    step="0.01"
                    min="0"
                    required
                >
            </div>

            <!-- Quantity -->
            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input 
                    type="number" 
                    name="stock"
                    class="form-control"
                    min="0"
                    value="0"
                    required
                >
            </div>

            <!-- Best Before Date -->
            <div class="mb-3">
                <label class="form-label">Best Before Date</label>
                <input 
                    type="date"
                    name="best_before"
                    class="form-control"
                    required
                >
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success w-100">
                Add Product
            </button>

        </form>

    </div>
</div>

{% endblock %}
