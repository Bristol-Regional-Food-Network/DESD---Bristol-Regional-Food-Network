{% extends "base/base.html" %}
{% block title %}Register Community Group{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Community Group Registration</h1>
        <p class="text-muted mb-4">Create an organisation account for larger local food orders.</p>
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary w-100" type="submit">Register as Community Group</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
