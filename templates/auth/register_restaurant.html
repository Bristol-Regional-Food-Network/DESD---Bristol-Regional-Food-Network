{% extends "base/base.html" %}
{% block title %}Register Restaurant{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Restaurant Registration</h1>
        <p class="text-muted mb-4">Create a restaurant account for regular local ingredient sourcing.</p>
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success w-100" type="submit">Register as Restaurant</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
